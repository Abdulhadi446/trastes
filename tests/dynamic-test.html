<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Test - Class IX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans', Arial, sans-serif; font-size: 15px; line-height: 1.7; background: #f0f4f8; color: #1a1a2e; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 24px; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px; margin-bottom: 20px; border-radius: 12px; }
  .subject-select { text-align: center; margin-bottom: 20px; }
  .subject-select label { font-size: 18px; font-weight: 500; margin-right: 10px; }
  .subject-select select { padding: 10px 20px; font-size: 16px; border: 2px solid #667eea; border-radius: 8px; }
  .start-btn { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 15px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: 500; cursor: pointer; transition: transform 0.2s; }
  .start-btn:hover { transform: scale(1.02); }
  .start-btn:disabled { background: #ccc; cursor: not-allowed; }
  .timer { text-align: center; font-size: 20px; font-weight: 700; color: #c62828; margin-bottom: 15px; }
  .progress { text-align: center; margin-bottom: 20px; color: #666; }
  .question { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #667eea; }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .q-num { font-weight: 700; color: #667eea; font-size: 16px; }
  .q-type { background: #e8eaf6; color: #5c6bc0; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .q-text { font-size: 16px; font-weight: 500; margin-bottom: 15px; color: #1a1a2e; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn { padding: 12px 16px; background: #f5f5f5; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; transition: all 0.2s; }
  .opt-btn:hover { background: #e8eaf6; border-color: #667eea; }
  .opt-btn.selected { background: #667eea; color: #fff; border-color: #667eea; }
  .opt-btn.correct { background: #4caf50; color: #fff; border-color: #4caf50; }
  .opt-btn.wrong { background: #f44336; color: #fff; border-color: #f44336; }
  textarea { width: 100%; min-height: 100px; padding: 12px; font-size: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: inherit; resize: vertical; }
  textarea:focus { outline: none; border-color: #667eea; }
  .result-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
  .result-box h2 { font-size: 28px; margin-bottom: 10px; }
  .result-box .score { font-size: 48px; font-weight: 700; }
  .result-box .grade { font-size: 36px; font-weight: 700; }
  .feedback { background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .feedback h3 { color: #667eea; margin-bottom: 10px; }
  .detail { padding: 10px; margin: 5px 0; background: #f5f5f5; border-radius: 6px; }
  .loading { text-align: center; padding: 40px; }
  .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .back-link { display: inline-block; background: #667eea; color: #fff; padding: 12px 24px; text-decoration: none; border-radius: 8px; margin-top: 20px; }
  .marks-info { font-size: 12px; color: #888; margin-top: 5px; }
</style>
</head>
<body>

<div class="container">
  <h1>Class IX Dynamic Test<br><small>AI-Generated & AI-Graded</small></h1>
  
  <div class="subject-select">
    <label>Select Subject:</label>
    <select id="subject">
      <option value="English">English</option>
      <option value="Mathematics">Mathematics</option>
      <option value="Science">Science</option>
      <option value="Urdu">Urdu</option>
    </select>
  </div>
  
  <button class="start-btn" onclick="startTest()" id="startBtn">Start New Test</button>
  
  <div class="timer" id="timer" style="display:none;">Time: <span id="time">30:00</span></div>
  <div class="progress" id="progress"></div>
  
  <div id="questions"></div>
  <div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <p>Generating fresh questions...</p>
  </div>
  
  <button class="start-btn" onclick="submitTest()" id="submitBtn" style="display:none;">Submit & Get Grade</button>
  
  <div id="result" class="result-box" style="display:none;">
    <h2>Test Complete!</h2>
    <div class="score"><span id="score">0</span> / <span id="total">0</span></div>
    <div class="grade">Grade: <span id="grade">-</span></div>
  </div>
  
  <div id="feedback" class="feedback" style="display:none;"></div>
  
  <a href="../index.html" class="back-link" id="backLink" style="display:none;">← Back to Main</a>
</div>

<script>
let testData = null;
let userAnswers = {};
let time = 1800;

async function startTest() {
  const subject = document.getElementById('subject').value;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('questions').innerHTML = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('feedback').style.display = 'none';
  
  try {
    const res = await fetch('/generate-test', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({subject})
    });
    testData = await res.json();
    userAnswers = {};
    
    renderQuestions();
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('submitBtn').style.display = 'block';
    document.getElementById('timer').style.display = 'block';
    startTimer();
  } catch(e) {
    alert('Error generating test: ' + e);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
  }
}

function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = testData.questions.map((q, i) => {
    const marks = q.type === 'mcq' || q.type === 'fill' ? 1 : q.type === 'short' ? 2 : 5;
    if (q.type === 'mcq') {
      return `<div class="question" data-idx="${i}">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <span class="q-type">MCQ</span>
        </div>
        <div class="q-text">${q.question}</div>
        <div class="options">${q.options.map((opt, j) => {
          const letter = String.fromCharCode(97 + j);
          return `<button class="opt-btn" onclick="selectOpt(${i}, '${letter}', this)">${opt}</button>`;
        }).join('')}</div>
        <div class="marks-info">Marks: ${marks}</div>
      </div>`;
    } else if (q.type === 'fill') {
      return `<div class="question" data-idx="${i}">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <span class="q-type">Fill in Blank</span>
        </div>
        <div class="q-text">${q.question}</div>
        <textarea placeholder="Type your answer here..." onchange="setAnswer(${i}, this.value)"></textarea>
        <div class="marks-info">Marks: ${marks}</div>
      </div>`;
    } else {
      return `<div class="question" data-idx="${i}">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <span class="q-type">${q.type === 'short' ? 'Short Answer' : 'Long Answer'}</span>
        </div>
        <div class="q-text">${q.question}</div>
        <textarea placeholder="Write your answer here..." onchange="setAnswer(${i}, this.value)"></textarea>
        <div class="marks-info">Marks: ${marks}</div>
      </div>`;
    }
  }).join('');
  
  document.getElementById('progress').textContent = `Questions: ${testData.questions.length}`;
}

function selectOpt(qIdx, ans, btn) {
  const qDiv = document.querySelectorAll('.question')[qIdx];
  qDiv.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  userAnswers[qIdx] = ans;
}

function setAnswer(qIdx, ans) {
  userAnswers[qIdx] = ans;
}

function startTimer() {
  time = 1800;
  const interval = setInterval(() => {
    if (time > 0 && document.getElementById('submitBtn').style.display !== 'none') {
      time--;
      let m = Math.floor(time / 60);
      let s = time % 60;
      document.getElementById('time').textContent = m + ':' + (s < 10 ? '0' + s : s);
    } else {
      clearInterval(interval);
    }
  }, 1000);
}

async function submitTest() {
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').innerHTML = 'Grading...';
  document.getElementById('loading').style.display = 'block';
  
  try {
    const res = await fetch('/grade-test', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        questions: testData.questions,
        answers: userAnswers
      })
    });
    const result = await res.json();
    
    document.getElementById('score').textContent = result.score;
    document.getElementById('total').textContent = result.total;
    document.getElementById('grade').textContent = result.grade;
    document.getElementById('result').style.display = 'block';
    
    if (result.feedback) {
      document.getElementById('feedback').innerHTML = `<h3>Feedback</h3><p>${result.feedback}</p>`;
      document.getElementById('feedback').style.display = 'block';
    }
    
    document.getElementById('timer').style.display = 'none';
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('backLink').style.display = 'inline-block';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').textContent = 'Start New Test';
  } catch(e) {
    alert('Error grading: ' + e);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }
}
</script>

</body>
</html>
