<!DOCTYPE html>

<head>

<title>درخواست</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Nastaliq Urdu', Arial; font-size: 16px; line-height: 2; background: #f5f5f5; color: #333; padding: 20px; max-width: 800px; margin: 0 auto; }

  .section { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; }
  .format { background: #fbe9e7; padding: 15px; margin: 10px 0; }
  .back-link { display: inline-block; background: #d84315; color: #fff; padding: 8px 16px; text-decoration: none; border-radius: 4px; margin-top: 20px; }

<body>

<h1>درخواست</h1>

<div class="section">
  <h2>درخواست کا طریقہ</h2>
  <div class="format">
    <p>حضرت مدیر محترم</p>
    <p>___ اسکول ___</p>
    <p>جید: ___</p>
    <p>محترم بہادر،</p>
    <p>میں ___ کلاس ___ کا طالب علم ہوں۔ میں درخواست کرتا ہوں کہ ___</p>
    <p>شکریہ کے ساتھ</p>
    <p>آپکا محبی</p>
    <p>___</p>
    <p>کلاس ___</p>
  </div>
</div>

<div class="section">
  <h2>مشہور درخواستیں</h2>
  <ul>
    <li>چھٹیوں کی اجازت</li>
    <li>فیس میں رعایت</li>
    <li>کتاب کا اجورہ</li>
    <li>بس سروس</li>
    <li>سیکشن تبدیلی</li>
  </ul>
</div>
